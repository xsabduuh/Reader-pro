<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Préparation Zakaria – Option Radiologique</title>
  <!-- تم حذف: manifest, apple-mobile-web-app-capable, theme-color -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13; --bg2: #18181f; --bg3: #22222d; --border: #2e2e3a;
      --text: #f0f0f5; --text2: #a0a0b8; --text3: #606078;
      --accent: #6c63ff; --accent2: #5a52e0; --accent-light: rgba(108,99,255,0.15);
      --green: #22c55e; --green-light: rgba(34,197,94,0.15);
      --yellow: #f59e0b; --yellow-light: rgba(245,158,11,0.12);
      --red: #ef4444; --red-light: rgba(239,68,68,0.12);
      --radius: 14px; --radius-sm: 8px; --nav-h: 64px; --header-h: 56px; --transition: 0.2s ease;
      --hero-end: #9c5cf5;
    }
    [data-theme="light"] {
      --bg: #f5f5fa; --bg2: #ffffff; --bg3: #ededf5; --border: #e0e0ea;
      --text: #111118; --text2: #555568; --text3: #9090a8;
      --accent: #5b52f0; --accent2: #4a42df; --accent-light: rgba(91,82,240,0.1);
      --green: #16a34a; --green-light: rgba(22,163,74,0.1);
      --yellow: #d97706; --yellow-light: rgba(217,119,6,0.1);
      --red: #dc2626; --red-light: rgba(220,38,38,0.1);
      --hero-end: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      transition: background var(--transition), color var(--transition);
      direction: ltr;
      text-align: left;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .header {
      height: calc(var(--header-h) + env(safe-area-inset-top));
      padding-top: env(safe-area-inset-top);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      gap: 10px;
      flex-shrink: 0;
      z-index: 10;
    }
    .header-title { flex: 1; font-weight: 700; font-size: 17px; color: var(--text); }
    .header-action { background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.15s, color 0.15s, transform 0.1s; }
    .header-action:active { background: var(--bg3); transform: scale(0.85); }
    .back-btn { color: var(--accent); }

    .page {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    .page-inner { padding: 16px; padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); }

    .bottom-nav {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
      z-index: 10;
      height: var(--nav-h);
      padding: 0 max(12px, env(safe-area-inset-left, 0px)) 0 max(12px, env(safe-area-inset-right, 0px));
      box-sizing: border-box;
    }
    .nav-item {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text3);
      font-size: 11px;
      font-family: inherit;
      transition: color 0.2s, transform 0.15s;
      border-radius: var(--radius-sm);
    }
    .nav-item i { font-size: 22px; transition: transform 0.15s; }
    .nav-item.active { color: var(--accent); } .nav-item.active i { transform: scale(1.15); }
    .nav-item:active { background: var(--bg3); transform: scale(0.9); }

    /* ===== باقي الأنماط ===== */
    .home-hero { background: linear-gradient(135deg, var(--accent) 0%, var(--hero-end) 100%); border-radius: var(--radius); padding: 22px 20px; color: #fff; margin-bottom: 16px; position: relative; overflow: hidden; }
    .home-hero::after { content: ''; position: absolute; top: -30px; right: -30px; width: 160px; height: 160px; background: rgba(255,255,255,0.06); border-radius: 50%; }
    .home-hero-label { font-size: 13px; opacity: 0.85; margin-bottom: 4px; }
    .home-hero-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
    .home-hero-progress { display: flex; align-items: center; gap: 14px; }
    .progress-ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
    .progress-ring-wrap svg { transform: rotate(-90deg); }
    .progress-ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 7; }
    .progress-ring-fill { fill: none; stroke: #fff; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .progress-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; line-height: 1.1; }
    .progress-ring-sub { font-size: 10px; opacity: 0.8; }
    .home-hero-stats { flex: 1; }
    .home-hero-stat { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
    .home-hero-stat strong { font-weight: 600; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; display: flex; flex-direction: column; gap: 4px; transition: transform 0.15s, background 0.15s; }
    .stat-card:active { transform: scale(0.95); background: var(--bg3); }
    .stat-card-icon { font-size: 22px; margin-bottom: 4px; } .stat-card-val { font-size: 20px; font-weight: 700; } .stat-card-lbl { font-size: 12px; color: var(--text3); }
    .recent-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .recent-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: transform 0.15s, background 0.15s; }
    .recent-item:active { background: var(--bg3); transform: scale(0.97); }
    .recent-item-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .recent-item-info { flex: 1; min-width: 0; }
    .recent-item-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recent-item-sub { font-size: 12px; color: var(--text3); }
    
    .search-bar { background: var(--bg2); border: 1px solid var(--border); border-radius: 50px; padding: 10px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; transition: border-color 0.2s, box-shadow 0.2s; }
    .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .search-bar i { color: var(--text3); font-size: 18px; }
    .search-bar input { flex: 1; background: none; border: none; outline: none; font-family: inherit; font-size: 14px; color: var(--text); }
    .search-bar input::placeholder { color: var(--text3); }
    
    .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .folder-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; }
    .folder-item:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.2); }
    .folder-item:active { transform: scale(0.95); background: var(--bg3); }
    .folder-item-icon { width: 56px; height: 56px; margin: 0 auto 8px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: transform 0.2s ease; }
    .folder-item:hover .folder-item-icon { transform: rotate(-5deg); }
    .folder-item-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .folder-item-progress { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
    .folder-mini-progress { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 4px; }
    .folder-mini-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    
    .file-browser { margin-top: 8px; }
    .file-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s ease; display: flex; align-items: center; gap: 10px; }
    .file-item:hover { background: var(--bg3); }
    .file-item:active { transform: scale(0.98); background: var(--bg3); }
    .file-item-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .file-item-info { flex: 1; min-width: 0; }
    .file-item-title { font-size: 14px; font-weight: 500; }
    .file-item-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .file-progress-ring { width: 44px; height: 44px; position: relative; flex-shrink: 0; }
    .file-progress-ring svg { transform: rotate(-90deg); }
    .file-progress-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text); }
    .file-arrow { color: var(--text3); font-size: 18px; transition: transform 0.15s; }
    .file-item:active .file-arrow { transform: translateX(4px); }
    
    .folder-breadcrumb { margin-bottom: 12px; }
    .folder-back-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-family: inherit; font-size: 13px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .folder-back-btn:active { background: var(--accent-light); color: var(--accent); transform: scale(0.95); }
    
    .subject-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; overflow: hidden; transition: transform 0.15s; }
    .subject-card:active { transform: scale(0.99); }
    .subject-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; transition: background 0.15s; }
    .subject-header:active { background: var(--bg3); }
    .subject-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .subject-info { flex: 1; min-width: 0; }
    .subject-name { font-weight: 600; font-size: 15px; }
    .subject-progress { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .progress-bar-wrap { height: 4px; background: var(--bg3); }
    .progress-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }
    
    .branch-header-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
    .branch-breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 6px; line-height: 1.4; }
    .branch-main-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .branch-progress-row { display: flex; align-items: center; gap: 10px; }
    .branch-progress-bar { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .branch-progress-val { font-size: 13px; font-weight: 600; color: var(--accent); }
    
    .partial-list { display: flex; flex-direction: column; gap: 10px; }
    .partial-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; transition: border-color 0.2s, transform 0.15s; }
    .partial-card:active { transform: scale(0.99); } .partial-card.completed { border-color: var(--green); }
    .partial-header { padding: 14px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; transition: background 0.15s; }
    .partial-header:active { background: var(--bg3); }
    .partial-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; margin-top: 1px; }
    .partial-check:active { transform: scale(0.8); background: var(--bg3); } .partial-check.done { background: var(--green); border-color: var(--green); color: #fff; } .partial-check i { font-size: 13px; }
    .partial-info { flex: 1; } .partial-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
    .partial-meta { font-size: 12px; color: var(--text3); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
    .partial-body { display: none; border-top: 1px solid var(--border); padding: 16px 14px; background: var(--bg2); } .partial-body.open { display: block; }
    
    .tab-bar { display: flex; gap: 4px; background: var(--bg3); border-radius: 12px; padding: 4px; margin-bottom: 14px; }
    .tab-btn { flex: 1; border: none; background: none; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--text3); padding: 8px 4px; border-radius: 9px; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .tab-btn i { font-size: 15px; }
    .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 3px 10px rgba(108,99,255,0.35); }
    .tab-btn:active { transform: scale(0.94); }

    .content-area { font-size: 13px; color: var(--text2); line-height: 1.7; }
    .notes-area { padding: 2px 0 6px; }
    .notes-textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px; font-family: inherit; font-size: 14px; color: var(--text); resize: vertical; min-height: 130px; outline: none; line-height: 1.75; transition: border-color 0.2s, box-shadow 0.2s; }
    .notes-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .notes-textarea::placeholder { color: var(--text3); }
    .save-notes-btn { margin-top: 10px; width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 12px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s, transform 0.1s; box-shadow: 0 3px 10px rgba(108,99,255,0.25); }
    .save-notes-btn:active { background: var(--accent2); transform: scale(0.97); }

    .exercises-area { display: flex; flex-direction: column; gap: 8px; }
    .exercise-item { background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; gap: 12px; align-items: center; transition: border-color 0.2s; }
    .exercise-item.done-item { border-color: var(--green); opacity: 0.7; }
    .exercise-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .exercise-check:active { transform: scale(0.8); } .exercise-check.done { background: var(--green); border-color: var(--green); color: #fff; } .exercise-check i { font-size: 13px; }
    .exercise-text { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.4; }
    .add-exercise-row { display: flex; gap: 8px; margin-top: 4px; }
    .add-exercise-input { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
    .add-exercise-input:focus { border-color: var(--accent); }
    .add-exercise-btn { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 10px 16px; font-family: inherit; font-size: 18px; cursor: pointer; display: flex; align-items: center; flex-shrink: 0; }
    .add-exercise-btn:active { background: var(--accent2); transform: scale(0.92); }

    .review-hero { background: linear-gradient(135deg, var(--accent-light), rgba(156,92,245,0.1)); border: 1.5px solid var(--accent-light); border-radius: 16px; padding: 24px 16px; text-align: center; margin-bottom: 12px; }
    .review-hero-count { font-size: 54px; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 6px; letter-spacing: -2px; }
    .review-hero-label { font-size: 13px; color: var(--text3); font-weight: 500; }
    .review-hero-stars { margin-top: 10px; font-size: 18px; letter-spacing: 4px; }
    .review-add-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 13px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s, transform 0.1s; box-shadow: 0 3px 10px rgba(108,99,255,0.25); }
    .review-add-btn:active { background: var(--accent2); transform: scale(0.97); }

    .complete-btn-wrap { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .complete-btn { width: 100%; border: none; border-radius: 12px; padding: 13px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; }
    .complete-btn:active { transform: scale(0.96); } .complete-btn.done { background: var(--green-light); color: var(--green); border: 1.5px solid var(--green); } .complete-btn.undone { background: var(--accent); color: #fff; box-shadow: 0 3px 10px rgba(108,99,255,0.25); }

    .delete-module-btn { background: var(--red-light); border: 1.5px solid rgba(239,68,68,0.2); color: var(--red); border-radius: 10px; padding: 8px 13px; cursor: pointer; font-size: 19px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .delete-module-btn:active { background: var(--red); color: #fff; transform: scale(0.88); }
    
    .week-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 16px; }
    .day-cell { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 4px; text-align: center; cursor: pointer; transition: all 0.2s, transform 0.1s; }
    .day-cell:active { background: var(--bg3); transform: scale(0.9); border-color: var(--accent); } .day-cell.active { border-color: var(--accent); background: var(--accent-light); } .day-cell.today { border-color: var(--yellow); }
    .day-name { font-size: 10px; color: var(--text3); margin-bottom: 4px; } .day-num { font-size: 16px; font-weight: 700; }
    .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin: 3px auto 0; opacity: 0; } .day-cell.has-sessions .day-dot { opacity: 1; }
    
    .sessions-container { display: flex; flex-direction: column; gap: 10px; }
    .session-add-card { background: var(--bg2); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 10px; }
    .session-add-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text2); }
    .session-add-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .session-select { flex: 1; min-width: 120px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; }
    .session-time-input, .session-duration-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--text); outline: none; width: 100px; }
    .session-add-submit { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .session-add-submit:active { background: var(--accent2); transform: scale(0.95); }
    .session-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
    .session-card:active { background: var(--bg3); transform: scale(0.98); } .session-card.completed { opacity: 0.6; border-color: var(--green); }
    .session-time-badge { background: var(--accent-light); color: var(--accent); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .session-info { flex: 1; } .session-subject { font-size: 14px; font-weight: 600; } .session-detail { font-size: 12px; color: var(--text3); }
    .session-complete-btn { background: none; border: none; color: var(--text3); font-size: 24px; cursor: pointer; padding: 4px; flex-shrink: 0; }
    .session-complete-btn:active { color: var(--green); transform: scale(0.8); } .session-complete-btn.done { color: var(--green); }
    .session-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; } .session-del:active { color: var(--red); transform: scale(0.8); }

<body>
<div id="app">

  <nav class="bottom-nav" id="bottom-nav">

  </nav>
</div>

<!-- Modales -->
<div id="goal-modal" class="modal-overlay">
  <div class="modal-card"><div class="modal-header"><div class="modal-title">Objectif de la semaine</div><button class="modal-close" onclick="closeGoalModal()" aria-label="Fermer"><i class="ri-close-line"></i></button></div><div class="modal-body"><div class="modal-search-bar"><div class="search-bar" style="margin-bottom:0"><i class="ri-search-line"></i><input type="search" id="goal-search-input" placeholder="Rechercher..." oninput="onGoalModalSearch()" autocomplete="off" aria-label="Rechercher une partie" /></div></div><div id="goal-modal-results"></div></div><div class="modal-footer"><button class="save-notes-btn" onclick="saveWeeklyGoalFromModal()" style="background:var(--accent);color:#fff">Enregistrer</button><button class="save-notes-btn" onclick="closeGoalModal()" style="background:var(--bg3);color:var(--text)">Annuler</button></div></div>
</div>

</div>

  <div class="modal-card">
    <div class="modal-header"><div class="modal-title" id="subject-modal-title">Nouveau Module</div><button class="modal-close" onclick="closeSubjectModal()" aria-label="Fermer"><i class="ri-close-line"></i></button></div>
    <div class="modal-body">
      <div style="margin-bottom:16px"><label style="font-size:13px;color:var(--text3);display:block;margin-bottom:4px">Nom du module</label><input class="add-exercise-input" id="subject-name-input" placeholder="Ex: Anatomie pathologique" style="width:100%" aria-label="Nom du module"></div>
      <label style="font-size:13px;color:var(--text3);display:block;margin-bottom:4px">Icône</label>
      <div class="icon-select-grid" id="icon-select-grid"></div>
      <label style="font-size:13px;color:var(--text3);display:block;margin-bottom:4px;margin-top:12px">Couleur</label>
      <div class="color-select-grid" id="color-select-grid"></div>
      <input type="hidden" id="subject-id-input">
      <input type="hidden" id="subject-icon-input" value="ri-book-line">
      <input type="hidden" id="subject-color-input" value="#6c63ff">
    </div>
    <div class="modal-footer"><button class="save-notes-btn" onclick="saveSubjectFromModal()" style="background:var(--accent);color:#fff">Enregistrer</button><button class="save-notes-btn" onclick="closeSubjectModal()" style="background:var(--bg3);color:var(--text)">Annuler</button></div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

// ========== STORE ==========
const LS = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};
const KEY_PROGRESS = 'prep_progress', KEY_NOTES = 'prep_notes', KEY_EXERCISES = 'prep_exercises', KEY_ACTIVITY = 'prep_activity';
const KEY_TIMER = 'prep_timer', KEY_SCHEDULE = 'prep_schedule', KEY_THEME = 'prep_theme', KEY_WEEKLY_GOAL = 'prep_weekly_goal';
const KEY_CUSTOM_PARTIALS = 'prep_custom_partials', KEY_SUBJECTS = 'prep_subjects_v3';
const KEY_VIEW_MODE = 'prep_view_mode';

// ========== THEME ==========
let currentTheme = LS.get(KEY_THEME, 'dark');
function applyTheme(t) { 
  document.documentElement.setAttribute('data-theme', t); 
  const icon = document.getElementById('theme-icon'); 
  if (icon) icon.className = t === 'dark' ? 'ri-moon-line' : 'ri-sun-line'; 
}
function toggleTheme() { currentTheme = currentTheme === 'dark' ? 'light' : 'dark'; LS.set(KEY_THEME, currentTheme); applyTheme(currentTheme); }
applyTheme(currentTheme);

// ========== DATA ==========
const DEFAULT_SUBJECTS = [
  { id: "subj-physradio", title: "Physique appliquée en radiologie", icon: 'ri-flashlight-line', color: '#f59e0b' },
  { id: "subj-physcan", title: "Physique appliquée en scanographie", icon: 'ri-scan-line', color: '#3b82f6' },
  { id: "subj-protoTDM", title: "Protocole en TDM", icon: 'ri-file-list-3-line', color: '#8b5cf6' },
  { id: "subj-physIRM", title: "Physique appliquée en IRM", icon: 'ri-flask-line', color: '#ec4899' },
  { id: "subj-protoIRM", title: "Protocoles IRM", icon: 'ri-file-text-line', color: '#14b8a6' },
  { id: "subj-anatphys", title: "Anatomie et physiologie humaine", icon: 'ri-heart-pulse-line', color: '#ef4444' },
  { id: "subj-anatTopo", title: "Anatomie topographique et radiologique", icon: 'ri-scan-2-line', color: '#f97316' },
  { id: "subj-techAxial", title: "Technique axiale d'exploration radiologique", icon: 'ri-ruler-line', color: '#84cc16' },
  { id: "subj-techApp", title: "Technique appendiculaire d'exploration radiologique", icon: 'ri-tools-line', color: '#06b6d4' },
  { id: "subj-pharmaco", title: "Pharmacologie et technique viscérale", icon: 'ri-capsule-line', color: '#a855f7' },
  { id: "subj-sciencesBio", title: "Les sciences biologiques", icon: 'ri-microscope-line', color: '#22c55e' },
  { id: "subj-santeNat", title: "Systèmes nationaux de la santé et économie de la santé", icon: 'ri-government-line', color: '#64748b' },
  { id: "subj-commInfo", title: "Langue, communication, informatique", icon: 'ri-chat-3-line', color: '#2563eb' },
  { id: "subj-maintenance", title: "Maintenance, démarche qualité, gestion des risques", icon: 'ri-settings-3-line', color: '#78716c' },
  { id: "subj-radioBio", title: "Radiobiologie et radioprotection", icon: 'ri-shield-flash-line', color: '#ef4444' },
  { id: "subj-echoAngio", title: "Échographie et angiographie", icon: 'ri-pulse-line', color: '#10b981' },
  { id: "subj-osteoAxiale", title: "Ostéologie axiale", icon: 'ri-user-line', color: '#d97706' },
  { id: "subj-osteoApp", title: "Ostéologie appendiculaire", icon: 'ri-run-line', color: '#b45309' },
  { id: "subj-mathsPhys", title: "Mathématiques et physique fondamentale", icon: 'ri-calculator-line', color: '#6366f1' },
  { id: "subj-semioPath", title: "Sémiologie et pathologie médicale", icon: 'ri-stethoscope-line', color: '#dc2626' },
  { id: "subj-soinsInf", title: "Soins infirmiers de base et pathologie chirurgicale", icon: 'ri-nurse-line', color: '#0ea5e9' },
  { id: "subj-droitEthique", title: "Le droit et l'éthique", icon: 'ri-scales-3-line', color: '#4b5563' },
  { id: "subj-demographie", title: "Démographie, épidémiologie et statistiques sanitaires", icon: 'ri-pie-chart-line', color: '#0891b2' },
  { id: "subj-psychoSocio", title: "Psychologie, sociologie", icon: 'ri-user-heart-line', color: '#be185d' }
];

function initSubjects() {
  if (!LS.get(KEY_SUBJECTS, null)) {
    const subjectsWithStructure = DEFAULT_SUBJECTS.map(s => ({
      ...s,
      branches: [{ id: "main-" + s.id, title: "Main", partials: [] }],
      _simple: true
    }));
    LS.set(KEY_SUBJECTS, subjectsWithStructure);
  } else {
    const existing = LS.get(KEY_SUBJECTS, []);
    const needsMigration = existing.some(s => !s._simple);
    if (needsMigration) {
      const migrated = existing.map(s => ({
        id: s.id, title: s.title, icon: s.icon, color: s.color,
        branches: [{ id: "main-" + s.id, title: "Main", partials: [] }],
        _simple: true
      }));
      LS.set(KEY_SUBJECTS, migrated);
      LS.set(KEY_CUSTOM_PARTIALS, []);
      LS.set(KEY_PROGRESS, {});
    }
  }
}
initSubjects();

function getSubjects() { return LS.get(KEY_SUBJECTS, DEFAULT_SUBJECTS); }
function saveSubjects(subjects) { LS.set(KEY_SUBJECTS, subjects); }

const ICON_OPTIONS = [
  'ri-book-line', 'ri-flashlight-line', 'ri-scan-line', 'ri-file-list-3-line', 'ri-flask-line', 'ri-file-text-line',
  'ri-heart-pulse-line', 'ri-scan-2-line', 'ri-ruler-line', 'ri-tools-line', 'ri-capsule-line', 'ri-microscope-line',
  'ri-government-line', 'ri-chat-3-line', 'ri-settings-3-line', 'ri-shield-flash-line', 'ri-pulse-line',
  'ri-user-line', 'ri-calculator-line', 'ri-stethoscope-line', 'ri-nurse-line', 'ri-scales-3-line',
  'ri-pie-chart-line', 'ri-user-heart-line', 'ri-lungs-line', 'ri-lightbulb-line', 'ri-discuss-line',
  'ri-syringe-line', 'ri-hospital-line', 'ri-book-2-line', 'ri-thermometer-line', 'ri-drop-line'
];

const COLOR_OPTIONS = [
  '#f59e0b', '#3b82f6', '#8b5cf6', '#ec4899', '#14b8a6', '#ef4444', '#f97316', '#84cc16', '#06b6d4', '#a855f7',
  '#22c55e', '#64748b', '#2563eb', '#78716c', '#dc2626', '#b45309', '#6366f1', '#0ea5e9', '#4b5563', '#0891b2', '#be185d'
];

function subjMeta(id) { return getSubjects().find(s => s.id === id) || { icon: 'ri-book-line', color: '#6c63ff' }; }

// ========== CUSTOM PARTIALS & HELPERS ==========
function getCustomPartials() { return LS.get(KEY_CUSTOM_PARTIALS, []); }
function addCustomPartial(branchId, title) { const customs = getCustomPartials(); const id = 'custom-' + Date.now() + '-' + Math.random().toString(36).substr(2,5); customs.push({ id, branchId, title, createdAt: new Date().toISOString() }); LS.set(KEY_CUSTOM_PARTIALS, customs); return id; }
function deleteCustomPartial(id) { const customs = getCustomPartials().filter(p => p.id !== id); LS.set(KEY_CUSTOM_PARTIALS, customs); }

function getAllPartials() {
  const subs = getSubjects();
  const builtin = [];
  subs.forEach(s => (s.branches||[]).forEach(b => (b.partials||[]).forEach(p => builtin.push({ ...p, branchId: b.id, subjectId: s.id, subjectTitle: s.title }))));
  const customs = getCustomPartials().map(p => { const b = findBranch(p.branchId); return { ...p, subjectId: b?.subjectId, subjectTitle: b?.subjectTitle || '' }; });
  return [...builtin, ...customs];
}
function getAllBranches() { const all = []; getSubjects().forEach(s => (s.branches||[]).forEach(b => all.push({...b, subjectId: s.id, subjectTitle: s.title}))); return all; }

function findBranch(id) { 
  const b = getAllBranches().find(x => x.id === id);
  if (b) return b;
  if (id && (id.startsWith('main-') || id.startsWith('b-'))) {
    const subjId = id.startsWith('main-') ? id.replace('main-', '') : id.replace('b-', '');
    const s = getSubjects().find(x => x.id === subjId);
    if (s) {
      return { id, title: "Main", subjectId: s.id, subjectTitle: s.title, partials: [] };
    }
  }
  return null;
}

function getBranchPartials(branchId) { const branch = findBranch(branchId); if (!branch) return []; const builtin = branch.partials || []; const customs = getCustomPartials().filter(p => p.branchId === branchId); return [...builtin, ...customs]; }

function addBranchToSubject(subjectId, title) {
  const subjects = getSubjects();
  const subject = subjects.find(s => s.id === subjectId);
  if (!subject) return null;
  if (!subject.branches) subject.branches = [];
  const branchId = 'b-' + Date.now() + '-' + Math.random().toString(36).substr(2,5);
  subject.branches.push({ id: branchId, title: title, partials: [] });
  saveSubjects(subjects);
  return branchId;
}

function getProgress() { return LS.get(KEY_PROGRESS, {}); }
function setPartialProgress(pid, data) { const p = getProgress(); const e = p[pid] || {}; const m = {...e, ...data}; Object.keys(m).forEach(k => m[k]===undefined && delete m[k]); p[pid]=m; LS.set(KEY_PROGRESS, p); }
function isCompleted(pid) { return !!(getProgress()[pid]||{}).completed; }
function getReviewCount(pid) { return (getProgress()[pid]||{}).reviewCount || 0; }
function getNotes(pid) { return (LS.get(KEY_NOTES,{}))[pid]||''; }
function setNotes(pid, t) { const n=LS.get(KEY_NOTES,{}); n[pid]=t; LS.set(KEY_NOTES,n); }
function getExercises(pid) { return (LS.get(KEY_EXERCISES,{}))[pid]||[]; }
function setExercises(pid, ex) { const e=LS.get(KEY_EXERCISES,{}); e[pid]=ex; LS.set(KEY_EXERCISES,e); }

function calcSubjectProgress(subjectId) { 
  const all = getAllPartials().filter(p => p.subjectId === subjectId); 
  if (!all.length) return 0; 
  const done = all.filter(p => isCompleted(p.id)).length;
  return Math.round((done / all.length) * 100); 
}

function calcBranchProgress(branchId) { 
  const ps = getBranchPartials(branchId); 
  if (!ps.length) return {done:0, total:0, pct:0}; 
  const d = ps.filter(p => isCompleted(p.id)).length; 
  return {done:d, total:ps.length, pct: Math.round((d/ps.length)*100)}; 
}

function calcOverallProgress() { 
  const allPartials = getAllPartials();
  if (!allPartials.length) return {done:0, total:0, pct:0};
  const done = allPartials.filter(p => isCompleted(p.id)).length;
  return {done, total: allPartials.length, pct: Math.round((done / allPartials.length) * 100)};
}

function totalReviews() { return Object.values(getProgress()).reduce((s,v)=>s+(v.reviewCount||0),0); }
function todayKey() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ========== WEEKLY GOAL ==========
function getCurrentWeekMonday() { const n=new Date(); const d=n.getDay(); const diff=d===0?-6:1-d; const m=new Date(n); m.setDate(n.getDate()+diff); m.setHours(0,0,0,0); return m; }
function getWeekEnd(m) { const e=new Date(m); e.setDate(m.getDate()+7); return e; }
function getWeekKey() { const m=getCurrentWeekMonday(); return `${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,'0')}-${String(m.getDate()).padStart(2,'0')}`; }
function formatDate(d) { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; }
function getWeeklyGoal() { const g=LS.get(KEY_WEEKLY_GOAL,null); if(g&&g.weekMonday===getWeekKey()) return g; if(g) LS.set(KEY_WEEKLY_GOAL,null); return null; }
function saveWeeklyGoal(ids) { LS.set(KEY_WEEKLY_GOAL,{weekMonday:getWeekKey(),startDate:getCurrentWeekMonday().toISOString(),endDate:getWeekEnd(getCurrentWeekMonday()).toISOString(),partials:ids}); }

function calcGoalProgress(goal) {
  const {partials}=goal;
  let d=0;
  partials.forEach(pid=>{ if(isCompleted(pid)) d++; });
  return {done:d,total:partials.length,pct:partials.length?Math.round((d/partials.length)*100):0};
}

// ========== ROUTER ==========
let currentPage='home', historyStack=[];
function nav(page, push=true) { 
  const mp=['home','subjects','schedule','stats']; 
  if(mp.includes(page)) historyStack=[]; 
  else if(push&&currentPage!==page) historyStack.push(currentPage); 
  currentPage=page; 
  updateNav(page); 
  renderPage(page); 
}
function goBack() { 
  const p=historyStack.pop(); 
  if(p) nav(p,false); 
  else nav('home',false); 
}
function updateNav(page) { 
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page)); 
  const mp=['home','subjects','schedule','stats']; 
  document.getElementById('back-btn').style.display=mp.includes(page)?'none':''; 
  const t={home:'Préparation Zakaria',subjects:'Modules',schedule:'Planning',stats:'Statistiques'}; 
  if(page.startsWith('branch:')){ 
    const b=findBranch(page.replace('branch:','')); 
    document.getElementById('header-title').textContent=b?b.title:'Branche'; 
  } else if(page.startsWith('folder:')) {
    const s=getSubjects().find(x=>x.id===page.replace('folder:',''));
    document.getElementById('header-title').textContent=s?s.title:'Dossier';
  } else {
    document.getElementById('header-title').textContent=t[page]||'Préparation Zakaria'; 
  }
}
function showToast(msg) { 
  const t=document.getElementById('toast'); 
  t.textContent=msg; 
  t.classList.add('show'); 
  setTimeout(()=>t.classList.remove('show'),2200); 
}

// ========== RENDER ENGINE ==========
function renderPage(page) { 
  const c=document.getElementById('page-content'); 
  if(!c) return; 
  c.scrollTop=0; 
  try { 
    if(page==='home') c.innerHTML=renderHome(); 
    else if(page==='subjects') c.innerHTML=renderSubjectsPage(); 
    else if(page.startsWith('folder:')) c.innerHTML=renderFolderView(page.replace('folder:','')); 
    else if(page==='schedule') c.innerHTML=renderSchedule(); 
    else if(page==='stats') c.innerHTML=renderStats(); 
    else if(page.startsWith('branch:')) c.innerHTML=renderBranch(page.replace('branch:','')); 
  } catch(e){ 
    console.error(e);
    c.innerHTML='<div class="page-inner"><p>Erreur de chargement.</p></div>'; 
  } 
}

// ========== HOME ==========

  const weeklyGoal = getWeeklyGoal(); let goalCard = '';
  if(weeklyGoal&&weeklyGoal.partials.length) {
    const gp=calcGoalProgress(weeklyGoal); const gr=30,gc=2*Math.PI*gr,goffset=gc-(gp.pct/100)*gc; 
    const sd=formatDate(new Date(weeklyGoal.startDate)),ed=formatDate(new Date(weeklyGoal.endDate)); 
    const allDone=gp.done===gp.total&&gp.total>0;
    goalCard=`<div id="goal-card" class="goal-progress-card" style="border-color:${allDone?'var(--green)':'var(--accent-light)'}"><div class="goal-circle-wrap"><svg width="70" height="70" viewBox="0 0 70 70"><circle cx="35" cy="35" r="${gr}" fill="none" stroke="var(--bg3)" stroke-width="6"/><circle id="goal-circle-fill" cx="35" cy="35" r="${gr}" fill="none" stroke="${allDone?'var(--green)':'var(--accent)'}" stroke-width="6" stroke-linecap="round" stroke-dasharray="${gc}" stroke-dashoffset="${goffset}" transform="rotate(-90 35 35)" style="transition: stroke-dashoffset 0.6s ease"/></svg><div class="goal-circle-text"><span id="goal-pct">${gp.pct}%</span><span class="goal-circle-sub">Objectif</span></div></div><div class="goal-info"><div class="goal-title">${allDone?'Objectif atteint!':'Objectif de la semaine'}</div><div class="goal-desc">${gp.done}/${gp.total} complété(s) (${sd} - ${ed})</div><div class="goal-actions"><button onclick="openChecklistModal()"><i class="ri-check-double-line"></i> Tâches</button><button onclick="openGoalModal()"><i class="ri-edit-line"></i> Modifier</button></div></div></div>`;
  } else {
    goalCard=`<div class="goal-empty-card"><i class="ri-focus-2-line goal-empty-icon"></i><div style="color:var(--text2);margin-bottom:8px;font-size:16px;font-weight:600">Objectif de la semaine</div><p style="font-size:13px;color:var(--text3);margin-bottom:16px">Définissez vos objectifs pour la semaine</p><button class="save-notes-btn" onclick="openGoalModal()"><i class="ri-add-line"></i> Définir</button></div>`;
  }
  
  const prog=getProgress(); const studiedBranchIds=new Set(); 
  getAllPartials().forEach(p=>{ if(prog[p.id]&&(prog[p.id].completed||prog[p.id].reviewCount>0)) studiedBranchIds.add(p.branchId); }); 
  const allBranches=getAllBranches(); const studiedBranches=allBranches.filter(b=>studiedBranchIds.has(b.id)).slice(0,5);
  
  let recentHtml='';
  if(studiedBranches.length) { 
    recentHtml=`<div class="section-title">Dernièrement étudié</div><div class="recent-list">${studiedBranches.map(b=>{ 
      const meta=subjMeta(b.subjectId); const bp=calcBranchProgress(b.id); 
      return `<div class="recent-item" onclick="nav('branch:${b.id}')"><div class="recent-item-icon" style="background:${meta.color?meta.color+'33':'rgba(108,99,255,0.15)'};color:${meta.color||'#6c63ff'}"><i class="${meta.icon}"></i></div><div class="recent-item-info"><div class="recent-item-title">${escHtml(b.title)}</div><div class="recent-item-sub">${escHtml(b.subjectTitle)} · ${bp.done}/${bp.total} parties</div></div><i class="ri-arrow-right-s-line" style="color:var(--text3);font-size:18px"></i></div>`; 
    }).join('')}</div>`; 
  } else { 
    recentHtml=`<div class="empty-state"><i class="ri-book-open-line"></i><p>Commencez à étudier depuis la liste des modules</p></div>`; 
  }
  
  return `<div class="page-inner"><div class="home-hero"><div class="home-hero-label">Option Radiologique – ${new Date().getFullYear()}</div><div class="home-hero-title">Votre progression</div><div class="home-hero-progress"><div class="progress-ring-wrap"><svg width="80" height="80" viewBox="0 0 80 80"><circle class="progress-ring-bg" cx="40" cy="40" r="${r}"/><circle class="progress-ring-fill" cx="40" cy="40" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/></svg><div class="progress-ring-text"><span>${overall.pct}%</span><span class="progress-ring-sub">Complété</span></div></div><div class="home-hero-stats"><div class="home-hero-stat"><span>Parties terminées</span><strong>${overall.done}/${overall.total}</strong></div><div class="home-hero-stat"><span>Révisions</span><strong>${totalReviews()}</strong></div></div></div></div>${goalCard}<div class="stats-row"><div class="stat-card"><div class="stat-card-icon" style="color:var(--accent)"><i class="ri-book-open-line"></i></div><div class="stat-card-val">${getSubjects().length}</div><div class="stat-card-lbl">Modules</div></div><div class="stat-card"><div class="stat-card-icon" style="color:var(--green)"><i class="ri-checkbox-circle-line"></i></div><div class="stat-card-val">${overall.done}</div><div class="stat-card-lbl">Complété</div></div></div>${recentHtml}</div>`;

// ========== FOLDER VIEW ==========
function renderFolderView(subjectId) {
  const subject = getSubjects().find(s => s.id === subjectId);
  if (!subject) return '<div class="page-inner"><p>Module introuvable</p></div>';

  const mainBranch = (subject.branches || [])[0] || { id: 'main-' + subjectId, title: 'Main', partials: [] };
  const branchId = mainBranch.id;

  const partials = getBranchPartials(branchId);
  const doneP = partials.filter(p => isCompleted(p.id)).length;
  const allP = partials.length;
  const pct = allP ? Math.round((doneP / allP) * 100) : 0;

  const partialsHtml = partials.length
    ? '<div class="partial-list">' + partials.map((p, i) => renderPartialCard(p, i)).join('') + '</div>'
    : `<div class="empty-state" style="padding:40px 20px">
        <i class="ri-file-add-line" style="font-size:56px;color:var(--accent);opacity:0.7"></i>
        <p style="margin-top:12px;font-size:14px;color:var(--text3)">Aucune fiche pour l'instant</p>
        <p style="font-size:12px;color:var(--text3);margin-top:4px">Ajoutez votre première fiche ci-dessous</p>
      </div>`;

  const html = `
    <div class="page-inner">
      <div class="folder-breadcrumb" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px">
        <button class="folder-back-btn" style="margin-bottom:0" onclick="nav('subjects')">
          <i class="ri-arrow-left-line"></i> Tous les modules
        </button>
        <button class="delete-module-btn" onclick="deleteModule('${subjectId}')" title="Supprimer ce module" aria-label="Supprimer le module">
          <i class="ri-delete-bin-2-line"></i>
        </button>
      </div>

      <div class="branch-header-card">
        <div class="branch-breadcrumb">
          <span style="display:flex;align-items:center;gap:6px">
            <i class="${subject.icon}" style="color:${subject.color}"></i>
            ${escHtml(subject.title)}
          </span>
        </div>
        <div class="branch-main-title">Fiches du module</div>
        <div class="branch-progress-row">
          <div class="branch-progress-bar">
            <div class="progress-bar-fill" style="width:${pct}%;background:${subject.color}"></div>
          </div>
          <span class="branch-progress-val">${doneP}/${allP}</span>
        </div>
      </div>

      ${partialsHtml}

      <div class="add-partial-row" style="margin-top:16px;display:flex;gap:8px;">
        <input class="add-exercise-input" id="add-partial-folder-${branchId}"
          placeholder="Nouvelle fiche..." style="flex:1"
          onkeydown="if(event.key==='Enter')addPartialToModule('${subjectId}','${branchId}')"
          aria-label="Nouvelle fiche"/>

function deleteModule(subjectId) {
  if (!confirm('Supprimer ce module et toutes ses fiches ?')) return;
  const subject = getSubjects().find(s => s.id === subjectId);
  if (subject) {
    const branchIds = new Set((subject.branches||[]).map(b => b.id));
    branchIds.add('main-' + subjectId);
    branchIds.add('b-' + subjectId);
    LS.set(KEY_CUSTOM_PARTIALS, getCustomPartials().filter(p => !branchIds.has(p.branchId)));
  }
  saveSubjects(getSubjects().filter(s => s.id !== subjectId));
  nav('subjects');
  showToast('Module supprimé');
}

function addPartialToModule(subjectId, branchId) {
  const input = document.getElementById('add-partial-folder-' + branchId);
  if (!input || !input.value.trim()) return;
  addCustomPartial(branchId, input.value.trim());
  input.value = '';
  document.getElementById('page-content').innerHTML = renderFolderView(subjectId);
  showToast('Fiche ajoutée');
}

const activePartialTabs = {};

      </div>
    </div>
  `;

function restoreBranchState() {
  expandedPartials.forEach(pid => {
    const body = document.getElementById('pb-' + pid);
    const chevron = document.getElementById('chevron-' + pid);
    if (body) {
      body.classList.add('open');
      if (chevron) chevron.style.transform = 'rotate(180deg)';
      const tab = activePartialTabs[pid] || 'notes';
      switchTab(pid, tab);
    }
  });
}

            ${escHtml(p.title)} ${isCustom?'<span style="font-size:10px;opacity:0.6">(perso)</span>':''}
          </div>
          <div class="partial-meta">
            ${done?'<span class="chip chip-green"><i class="ri-check-line"></i> Complété</span>':'<span class="chip chip-accent"><i class="ri-time-line"></i> En cours</span>'}
            ${rc>0?`<span class="chip chip-yellow"><i class="ri-restart-line"></i> ${rc} révisions</span>`:''}
          </div>
        </div>
        ${isCustom?`<button class="delete-partial-btn" onclick="event.stopPropagation();deletePartial('${p.id}')" title="Supprimer" aria-label="Supprimer la fiche"><i class="ri-delete-bin-line"></i></button>`:''}

      </div>
      <div class="partial-body${isOpen?' open':''}" id="pb-${p.id}">
        <div class="tab-bar">
          <button class="tab-btn${(!activePartialTabs[p.id]||activePartialTabs[p.id]==='notes')?' active':''}" id="tab-notes-${p.id}" onclick="switchTab('${p.id}','notes')">
            <i class="ri-file-text-line"></i> Notes
          </button>
          <button class="tab-btn${activePartialTabs[p.id]==='exercises'?' active':''}" id="tab-exercises-${p.id}" onclick="switchTab('${p.id}','exercises')">
            <i class="ri-todo-line"></i> Exercices
          </button>
          <button class="tab-btn${activePartialTabs[p.id]==='review'?' active':''}" id="tab-review-${p.id}" onclick="switchTab('${p.id}','review')">
            <i class="ri-restart-line"></i> Révision
          </button>
        </div>
        <div id="tab-content-${p.id}">
          ${isOpen ? renderTabContent(p.id, activePartialTabs[p.id]||'notes') : renderNotesTab(p.id)}
        </div>
        <div class="complete-btn-wrap">
          <button class="complete-btn ${done?'done':'undone'}" id="cbtn-${p.id}" onclick="toggleComplete('${p.id}')">
            ${done?'<i class="ri-checkbox-circle-fill"></i> Annuler':'<i class="ri-checkbox-circle-line"></i> Marquer complété'}
          </button>
        </div>
      </div>
    </div>
  `;
}

function renderTabContent(pid, tab) {
  if (tab === 'notes') return renderNotesTab(pid);
  if (tab === 'exercises') return renderExercisesTab(pid);
  if (tab === 'review') return renderReviewTab(pid);
  return renderNotesTab(pid);
}

function addPartial(branchId) { 
  const input=document.getElementById('add-partial-input-'+branchId); 
  if(!input||!input.value.trim()) return; 
  addCustomPartial(branchId,input.value.trim()); 
  input.value=''; 
  document.getElementById('page-content').innerHTML=renderBranch(branchId); 
  showToast('Fiche ajoutée'); 
}

function deletePartial(pid) { 
  if(!confirm('Supprimer cette fiche ?')) return; 
  deleteCustomPartial(pid);
  if (currentPage.startsWith('folder:')) {
    document.getElementById('page-content').innerHTML = renderFolderView(currentPage.replace('folder:',''));
  } else {
    document.getElementById('page-content').innerHTML = renderBranch(currentPage.replace('branch:',''));
  }
  showToast('Fiche supprimée'); 
}

function togglePartial(pid) {
  const body=document.getElementById('pb-'+pid),chevron=document.getElementById('chevron-'+pid);
  if(!body) return;
  if(body.classList.contains('open')){
    body.classList.remove('open');
    if(chevron) chevron.style.transform='';
    expandedPartials.delete(pid);
  } else {
    body.classList.add('open');
    if(chevron) chevron.style.transform='rotate(180deg)';
    expandedPartials.add(pid);
    const tab = activePartialTabs[pid] || 'notes';
    switchTab(pid, tab);
  }
}

function switchTab(pid,tab) {
  activePartialTabs[pid] = tab;
  ['notes','exercises','review'].forEach(t=>{ 
    const btn=document.getElementById(`tab-${t}-${pid}`); 
    if(btn) btn.classList.toggle('active',t===tab); 
  });
  const area=document.getElementById('tab-content-'+pid);
  if(!area) return;
  if(tab==='notes') area.innerHTML=renderNotesTab(pid);
  else if(tab==='exercises') area.innerHTML=renderExercisesTab(pid);
  else if(tab==='review') area.innerHTML=renderReviewTab(pid);
}

function renderNotesTab(pid) {
  const notes = getNotes(pid);
  return `<div class="notes-area">
    <textarea class="notes-textarea" id="notes-ta-${pid}" placeholder="Ajoutez vos notes, résumés, points importants..." aria-label="Notes">${escHtml(notes)}</textarea>
    <button class="save-notes-btn" onclick="saveNotes('${pid}')">
      <i class="ri-save-3-line"></i> Enregistrer les notes
    </button>
  </div>`;
}

function renderExercisesTab(pid) {
  const exs = getExercises(pid);
  const items = exs.length
    ? exs.map((ex, i) => `
        <div class="exercise-item ${ex.done ? 'done-item' : ''}">
          <div class="exercise-check ${ex.done ? 'done' : ''}" onclick="toggleExercise('${pid}',${i})">
            ${ex.done ? '<i class="ri-check-line"></i>' : ''}
          </div>
          <div class="exercise-text" style="${ex.done ? 'text-decoration:line-through;color:var(--text3)' : ''}">${escHtml(ex.text)}</div>
          <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;flex-shrink:0;padding:2px;transition:color 0.15s" onclick="deleteExercise('${pid}',${i})" aria-label="Supprimer">
            <i class="ri-delete-bin-line"></i>
          </button>
        </div>`).join('')
    : `<div style="text-align:center;padding:24px 0 16px;color:var(--text3)">
        <i class="ri-checkbox-blank-circle-line" style="font-size:36px;display:block;margin-bottom:8px;opacity:0.4"></i>
        <span style="font-size:13px">Aucun exercice ajouté</span>
      </div>`;
  return `<div class="exercises-area">
    ${items}
    <div class="add-exercise-row">
      <input class="add-exercise-input" id="ex-input-${pid}" placeholder="Nouvel exercice..."
        onkeydown="if(event.key==='Enter')addExercise('${pid}')" aria-label="Nouvel exercice"/>
      <button class="add-exercise-btn" onclick="addExercise('${pid}')"><i class="ri-add-line"></i></button>
    </div>
  </div>`;
}

function renderReviewTab(pid) {
  const rc = getReviewCount(pid);
  const stars = rc === 0 ? '' : rc < 3 ? '⭐' : rc < 6 ? '⭐⭐' : rc < 10 ? '⭐⭐⭐' : '⭐⭐⭐⭐';
  return `<div>
    <div class="review-hero">
      <div class="review-hero-count">${rc}</div>
      <div class="review-hero-label">Révision${rc !== 1 ? 's' : ''} effectuée${rc !== 1 ? 's' : ''}</div>
      ${stars ? `<div class="review-hero-stars">${stars}</div>` : ''}
    </div>
    <button class="review-add-btn" onclick="addReview('${pid}')">
      <i class="ri-restart-line"></i> Marquer une révision
    </button>
  </div>`;
}

function saveNotes(pid) { 
  const ta=document.getElementById('notes-ta-'+pid); 
  if(!ta) return; 
  setNotes(pid,ta.value); 
  showToast('Notes enregistrées'); 
}

function addExercise(pid) { 
  const input=document.getElementById('ex-input-'+pid); 
  if(!input||!input.value.trim()) return; 
  const exs=getExercises(pid); 
  exs.push({text:input.value.trim(),done:false}); 
  setExercises(pid,exs); 
  switchTab(pid,'exercises'); 
  showToast('Exercice ajouté'); 
}

function toggleExercise(pid,idx) { 
  const exs=getExercises(pid); 
  if(!exs[idx]) return; 
  exs[idx].done=!exs[idx].done; 
  setExercises(pid,exs); 
  switchTab(pid,'exercises'); 
}

function deleteExercise(pid,idx) { 
  const exs=getExercises(pid); 
  exs.splice(idx,1); 
  setExercises(pid,exs); 
  switchTab(pid,'exercises'); 
}

function addReview(pid) { 
  const rc=getReviewCount(pid); 
  setPartialProgress(pid,{reviewCount:rc+1}); 
  switchTab(pid,'review'); 
  showToast('Révision ajoutée'); 
}

function toggleComplete(pid) { 
  const done=isCompleted(pid); 
  const now=new Date().toISOString(); 
  setPartialProgress(pid,{completed:!done,completedAt:!done?now:undefined}); 
  const card=document.getElementById('pc-'+pid),chk=document.getElementById('chk-'+pid),cbtn=document.getElementById('cbtn-'+pid); 
  if(card) card.classList.toggle('completed',!done); 
  if(chk){ 
    chk.className='partial-check '+(!done?'done':''); 
    chk.innerHTML=!done?'<i class="ri-check-line"></i>':''; 
  } 
  if(cbtn){ 
    cbtn.className='complete-btn '+(!done?'done':'undone'); 
    cbtn.innerHTML=!done?'<i class="ri-checkbox-circle-fill"></i> Annuler':'<i class="ri-checkbox-circle-line"></i> Marquer complété'; 
  } 
  showToast(!done?'Marqué complété':'Annulé'); 
  const act=LS.get(KEY_ACTIVITY,{}); 
  act[todayKey()]=(act[todayKey()]||0)+2; 
  LS.set(KEY_ACTIVITY,act); 
  updateGoalCardDisplay(); 
}

// ========== SCHEDULE ==========
let selectedDay=todayKey();
function renderSchedule() { 
  const today=new Date(); 
  const dn=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam']; 
  const schedule=LS.get(KEY_SCHEDULE,{}); 
  const days=[]; 
  for(let i=-3;i<=3;i++){ 
    const d=new Date(today); 
    d.setDate(today.getDate()+i); 
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; 
    days.push({key,dayName:dn[d.getDay()],dayNum:d.getDate(),isToday:i===0,hasSessions:!!(schedule[key]&&schedule[key].length)}); 
  } 
  const allSubjects=getSubjects(); 
  const sessions=schedule[selectedDay]||[]; 
  return `<div class="page-inner"><div class="section-title">Semaine en cours</div><div class="week-grid">${days.map(d=>`<div class="day-cell ${d.isToday?'today':''} ${d.key===selectedDay?'active':''} ${d.hasSessions?'has-sessions':''}" onclick="selectDay('${d.key}')"><div class="day-name">${d.dayName}</div><div class="day-num">${d.dayNum}</div><div class="day-dot"></div></div>`).join('')}</div><div class="session-add-card"><div class="session-add-title"><i class="ri-add-circle-line"></i> Ajouter une session</div><div class="session-add-row"><select class="session-select" id="sess-subj" aria-label="Module">${allSubjects.map(s=>`<option value="${s.id}">${s.title}</option>`).join('')}</select><input type="time" class="session-time-input" id="sess-time" value="09:00" aria-label="Heure"><input type="number" class="session-duration-input" id="sess-duration" placeholder="Heure" min="0.5" max="12" step="0.5" value="1" style="width:80px;" aria-label="Durée"></div><div style="margin-top:8px"><input type="text" class="add-exercise-input" id="sess-note" placeholder="Note optionnelle..." style="width:100%" aria-label="Note"></div><div style="margin-top:8px"><button class="session-add-submit" onclick="addSession()"><i class="ri-add-line"></i> Ajouter</button></div></div><div class="section-title">Sessions du jour</div><div class="sessions-container">${renderSessionsList(sessions)}</div></div>`; 
}

function renderSessionsList(sessions) { 
  if(!sessions.length) return '<div class="empty-state"><i class="ri-calendar-check-line"></i><p>Aucune session</p></div>'; 
  return sessions.map((s,i)=>{ 
    const meta=subjMeta(s.subjectId); 
    const subj=getSubjects().find(x=>x.id===s.subjectId); 
    return `<div class="session-card ${s.completed?'completed':''}" id="session-${i}"><div class="session-time-badge">${s.time}</div><div class="session-info"><div class="session-subject" style="color:${meta.color};${s.completed?'text-decoration:line-through;opacity:0.7':''}">${subj?escHtml(subj.title):escHtml(s.subjectId)}</div>${s.duration?`<div class="session-detail"><i class="ri-time-line"></i> ${s.duration}h</div>`:''}${s.note?`<div class="session-detail">${escHtml(s.note)}</div>`:''}</div><button class="session-complete-btn ${s.completed?'done':''}" onclick="toggleSessionComplete(${i})" title="${s.completed?'Annuler':'Terminé'}" aria-label="${s.completed?'Annuler la session':'Marquer comme terminé'}"><i class="ri-lg ${s.completed?'ri-checkbox-circle-fill':'ri-checkbox-circle-line'}"></i></button><button class="session-del" onclick="deleteSession(${i})" aria-label="Supprimer la session"><i class="ri-delete-bin-line"></i></button></div>`; 
  }).join(''); 
}

function selectDay(key) { selectedDay=key; document.getElementById('page-content').innerHTML=renderSchedule(); }
function addSession() { 
  const subjEl=document.getElementById('sess-subj'),timeEl=document.getElementById('sess-time'),durationEl=document.getElementById('sess-duration'),noteEl=document.getElementById('sess-note'); 
  if(!subjEl||!timeEl) return; 
  const duration=durationEl?parseFloat(durationEl.value)||0:0; 
  const schedule=LS.get(KEY_SCHEDULE,{}); 
  if(!schedule[selectedDay]) schedule[selectedDay]=[]; 
  schedule[selectedDay].push({subjectId:subjEl.value,time:timeEl.value,duration,note:noteEl?noteEl.value:'',completed:false}); 
  schedule[selectedDay].sort((a,b)=>a.time.localeCompare(b.time)); 
  LS.set(KEY_SCHEDULE,schedule); 
  document.getElementById('page-content').innerHTML=renderSchedule(); 
  showToast('Session ajoutée'); 
}
function toggleSessionComplete(idx) { 
  const schedule=LS.get(KEY_SCHEDULE,{}); 
  if(!schedule[selectedDay]||!schedule[selectedDay][idx]) return; 
  schedule[selectedDay][idx].completed=!schedule[selectedDay][idx].completed; 
  LS.set(KEY_SCHEDULE,schedule); 
  document.getElementById('page-content').innerHTML=renderSchedule(); 
}
function deleteSession(idx) { 
  if(!confirm('Supprimer cette session ?')) return; 
  const schedule=LS.get(KEY_SCHEDULE,{}); 
  if(schedule[selectedDay]){ schedule[selectedDay].splice(idx,1); LS.set(KEY_SCHEDULE,schedule); } 
  document.getElementById('page-content').innerHTML=renderSchedule(); 
  showToast('Session supprimée'); 
}

// ========== STATS ==========
function renderStats() { 
  const overall=calcOverallProgress(); 
  const allSubjects=getSubjects(); 
  const today=new Date(); 
  const activity=LS.get(KEY_ACTIVITY,{}); 
  const heatCells=[]; 
  for(let i=90;i>=0;i--){ 
    const d=new Date(today); d.setDate(today.getDate()-i); 
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; 
    const min=activity[key]||0; 
    const lvl=min===0?0:min<30?1:min<60?2:min<120?3:4; 
    heatCells.push(`<div class="heat-cell" data-lvl="${lvl}" title="${key}: ${Math.round(min)}min"></div>`); 
  } 
  return `<div class="page-inner"><div class="stats-hero-row"><div class="stats-mini"><div class="stats-mini-val text-accent">${overall.pct}%</div><div class="stats-mini-lbl">Progression</div></div><div class="stats-mini"><div class="stats-mini-val text-green">${overall.done}</div><div class="stats-mini-lbl">Complétés</div></div></div><div class="section-title">Progression par module</div><div class="subjects-progress">${allSubjects.map(s=>{ const pct=calcSubjectProgress(s.id); const meta=s; const subjectPartials=getAllPartials().filter(p=>p.subjectId===s.id); const doneP=subjectPartials.filter(p=>isCompleted(p.id)).length; const allP=subjectPartials.length; return `<div class="subj-progress-item"><div class="subj-progress-top"><span class="subj-progress-name"><i class="${meta.icon}" style="color:${meta.color};margin-right:6px"></i>${escHtml(s.title)}</span><span class="subj-progress-pct">${pct}%</span></div><div class="progress-bar-wrap" style="height:8px;border-radius:4px"><div class="progress-bar-fill" style="width:${pct}%;background:${meta.color};border-radius:4px"></div></div><div style="font-size:11px;color:var(--text3);margin-top:4px">${doneP}/${allP}</div></div>`; }).join('')}</div><div class="section-title">Activité (91 jours)</div><div class="heatmap-grid">${heatCells.join('')}</div><div class="heatmap-legend"><span>Moins</span><div class="heatmap-legend-cell" style="background:var(--bg3)"></div><div class="heatmap-legend-cell" data-lvl="1" style="background:rgba(108,99,255,0.25)"></div><div class="heatmap-legend-cell" data-lvl="2" style="background:rgba(108,99,255,0.5)"></div><div class="heatmap-legend-cell" data-lvl="3" style="background:rgba(108,99,255,0.75)"></div><div class="heatmap-legend-cell" data-lvl="4" style="background:var(--accent)"></div><span>Plus</span></div></div>`; 
}

  const nameInput = document.getElementById('subject-name-input');

}
function closeSubjectModal() { document.getElementById('subject-modal').classList.remove('open'); }
function renderIconGrid() { const grid = document.getElementById('icon-select-grid'); grid.innerHTML = ICON_OPTIONS.map(ic => `<div class="icon-option" data-icon="${ic}" onclick="selectIcon('${ic}')" role="button" tabindex="0" aria-label="Icône ${ic}"><i class="${ic}"></i></div>`).join(''); }
function selectIcon(icon) { document.getElementById('subject-icon-input').value = icon; document.querySelectorAll('#icon-select-grid .icon-option').forEach(el => el.classList.toggle('selected', el.dataset.icon === icon)); }
function renderColorGrid() { const grid = document.getElementById('color-select-grid'); grid.innerHTML = COLOR_OPTIONS.map(c => `<div class="color-option" style="background:${c}" data-color="${c}" onclick="selectColor('${c}')" role="button" tabindex="0" aria-label="Couleur ${c}"></div>`).join(''); }
function selectColor(color) { document.getElementById('subject-color-input').value = color; document.querySelectorAll('#color-select-grid .color-option').forEach(el => el.classList.toggle('selected', el.dataset.color === color)); }
function saveSubjectFromModal() {
  const name = document.getElementById('subject-name-input').value.trim();
  if (!name) { showToast('Le nom est requis'); return; }
  const id = document.getElementById('subject-id-input').value;

// ========== GOAL MODAL ==========
let goalModalSearchQuery = '';
function openGoalModal() { 
  document.getElementById('goal-modal').classList.add('open'); 
  goalModalSearchQuery = '';
  document.getElementById('goal-search-input').value = ''; 
  document.getElementById('goal-modal-results').innerHTML = renderGoalResults(getWeeklyGoal()?.partials || []); 
}
function closeGoalModal() { document.getElementById('goal-modal').classList.remove('open'); }
function onGoalModalSearch() { 
  goalModalSearchQuery = document.getElementById('goal-search-input').value; 
  document.getElementById('goal-modal-results').innerHTML = renderGoalResults(getWeeklyGoal()?.partials || []); 
}

function renderGoalResults(selectedIds) { 
  const q = goalModalSearchQuery.toLowerCase().trim(); 
  const allPartials = getAllPartials();
  
  if (q) { 
    const matching = allPartials.filter(p => 
      p.title.toLowerCase().includes(q) || 
      (p.subjectTitle && p.subjectTitle.toLowerCase().includes(q))
    ); 
    
    if (!matching.length) {
      return `<div class="empty-state"><i class="ri-search-line"></i><p>Aucun résultat pour "${escHtml(q)}"</p></div>`; 
    }
    
    return '<div style="display:flex;flex-direction:column;gap:6px">' + matching.map(p => { 
      const checked = selectedIds.includes(p.id); 
      return `
        <label class="modal-partial-label" style="cursor:pointer">
          <div class="modal-partial-checkbox ${checked?'checked':''}">
            ${checked?'<i class="ri-check-line"></i>':''}
          </div>
          <input type="checkbox" value="${p.id}" ${checked?'checked':''} style="display:none" onchange="toggleGoalCheckbox(this)">
          <span class="modal-partial-title">${escHtml(p.title)}</span>
          <span style="font-size:11px;color:var(--text3)">${escHtml(p.subjectTitle||'')}</span>
        </label>
      `; 
    }).join('') + '</div>'; 
  } 
  
  let html = '';
  const subjects = getSubjects();
  subjects.forEach(s => {
    const meta = s;
    const branches = s.branches || [];
    const hasMatchingPartials = branches.some(b => {
      const ps = getBranchPartials(b.id);
      return ps.length > 0;
    });
    
    if (!hasMatchingPartials) return;
    
    html += `
      <div style="margin-bottom:8px">
        <div class="modal-subject-header" onclick="toggleGoalSubject('${s.id}')">
          <div class="modal-subject-icon" style="background:${meta.color}33; color:${meta.color}">
            <i class="${meta.icon}"></i>
          </div>
          <div class="modal-subject-info">
            <div class="modal-subject-name">${escHtml(s.title)}</div>
            <div class="modal-subject-count">${branches.length} chapitre(s)</div>
          </div>
          <i class="ri-arrow-right-s-line modal-subject-chevron" id="goal-chevron-${s.id}"></i>
        </div>
        <div class="modal-subject-body" id="goal-subject-body-${s.id}">
          ${branches.map(b => {
            const ps = getBranchPartials(b.id);
            if (!ps.length) return '';
            return `
              <div class="modal-branch-row" onclick="toggleGoalBranch('${b.id}')">
                <span class="modal-branch-name">${escHtml(b.title)}</span>
                <span class="modal-branch-stats">${ps.length} parties</span>
                <i class="ri-arrow-down-s-line modal-branch-chevron" id="goal-branch-chevron-${b.id}"></i>
              </div>
              <div class="modal-partials-list" id="goal-branch-partials-${b.id}">
                ${ps.map(p => { 
                  const checked = selectedIds.includes(p.id); 
                  return `
                    <label class="modal-partial-label" style="cursor:pointer">
                      <div class="modal-partial-checkbox ${checked?'checked':''}">
                        ${checked?'<i class="ri-check-line"></i>':''}
                      </div>
                      <input type="checkbox" value="${p.id}" ${checked?'checked':''} style="display:none" onchange="toggleGoalCheckbox(this)">
                      <span class="modal-partial-title">${escHtml(p.title)}</span>
                    </label>
                  `; 
                }).join('')}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });
  
  if (!html) {
    html = '<div class="empty-state"><i class="ri-book-open-line"></i><p>Aucune partie disponible</p></div>';
  }
  
  return html; 
}

function toggleGoalSubject(id) { 
  const body = document.getElementById('goal-subject-body-'+id);
  const chevron = document.getElementById('goal-chevron-'+id); 
  if (body) { 
    body.classList.toggle('open'); 
    if (chevron) chevron.classList.toggle('open'); 
  } 
}
function toggleGoalBranch(id) { 
  const list = document.getElementById('goal-branch-partials-'+id);
  const chevron = document.getElementById('goal-branch-chevron-'+id); 
  if (list) { 
    list.classList.toggle('open'); 
    if (chevron) chevron.classList.toggle('open'); 
  } 
}
function toggleGoalCheckbox(el) { 
  const box = el.previousElementSibling; 
  box.classList.toggle('checked', el.checked); 
  box.innerHTML = el.checked ? '<i class="ri-check-line"></i>' : ''; 
}
function saveWeeklyGoalFromModal() { 
  const ids = [...document.querySelectorAll('#goal-modal-results input[type="checkbox"]:checked')].map(cb => cb.value); 
  if (!ids.length) { 
    showToast('Sélectionnez au moins une partie');

// ========== CHECKLIST ==========
function openChecklistModal() { document.getElementById('checklist-modal').classList.add('open'); renderChecklist(); }
function closeChecklistModal() { document.getElementById('checklist-modal').classList.remove('open'); updateGoalCardDisplay(); }
function renderChecklist() { 
  const goal=getWeeklyGoal(); 
  const body=document.getElementById('checklist-body'); 
  if(!goal||!goal.partials.length){ 
    body.innerHTML='<p style="text-align:center;padding:20px">Aucune tâche</p>'; 
    return; 
  } 
  const allP=getAllPartials(); 
  body.innerHTML=goal.partials.map(pid=>{ 
    const p=allP.find(pp=>pp.id===pid); 
    if(!p) return ''; 
    const done=isCompleted(pid); 
    return `<div class="checklist-item"><div class="checklist-item-actions"><div class="checklist-checkbox ${done?'checked':''}" onclick="toggleChecklistItem('${pid}')">${done?'<i class="ri-check-line" style="font-size:14px"></i>':''}</div><button class="checklist-delete-btn" onclick="removeChecklistItem('${pid}')" aria-label="Retirer la tâche"><i class="ri-delete-bin-line"></i></button></div><div class="checklist-item-title">${escHtml(p.title)}</div><div class="checklist-item-sub">${escHtml(p.subjectTitle)}</div></div>`; 
  }).join(''); 
}
function toggleChecklistItem(pid) { toggleComplete(pid); renderChecklist(); }
function removeChecklistItem(pid) { 
  const goal=getWeeklyGoal(); 
  if(!goal) return; 
  goal.partials=goal.partials.filter(id=>id!==pid); 
  if(!goal.partials.length){ clearWeeklyGoal(); closeChecklistModal(); } 
  else LS.set(KEY_WEEKLY_GOAL,goal); 
  renderChecklist(); 
  updateGoalCardDisplay(); 
}
function updateGoalCardDisplay() { 
  const card=document.getElementById('goal-card'); 
  if(!card) return; 
  const goal=getWeeklyGoal(); 
  if(!goal){ 
    if(currentPage==='home') {
      document.getElementById('page-content').innerHTML = renderHome();
    }
    return; 
  } 
  const gp=calcGoalProgress(goal); 
  const gr=30,gc=2*Math.PI*gr,goffset=gc-(gp.pct/100)*gc; 
  const allDone=gp.done===gp.total&&gp.total>0; 
  const circleFill=document.getElementById('goal-circle-fill'); 
  if(circleFill){ 
    circleFill.setAttribute('stroke-dashoffset',goffset); 
    circleFill.setAttribute('stroke',allDone?'var(--green)':'var(--accent)'); 
  } 
  const pctSpan=document.getElementById('goal-pct'); 
  if(pctSpan) pctSpan.textContent=gp.pct+'%'; 
}
function clearWeeklyGoal() { LS.set(KEY_WEEKLY_GOAL, null); }

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ========== INIT ==========
(function initGoalClear() { 
  const goal=LS.get(KEY_WEEKLY_GOAL,null); 
  if(goal&&goal.weekMonday!==getWeekKey()) LS.set(KEY_WEEKLY_GOAL,null); 
})();
nav('home', false);
</script>
